    <circle cx="0" cy="0" r="122" fill="url(#ballLight)"/>
    <circle cx="0" cy="0" r="122" fill="none" stroke="#1B3022" stroke-opacity="0.5" stroke-width="2"/>

    <g fill="#C5A059" fill-opacity="0.72">
      <circle cx="-46" cy="-58" r="7"/>
      <circle cx="-14" cy="-66" r="7"/>
      <circle cx="19" cy="-66" r="7"/>
      <circle cx="50" cy="-56" r="7"/>
      <circle cx="-64" cy="-28" r="7"/>
      <circle cx="-32" cy="-32" r="7"/>
      <circle cx="0" cy="-36" r="7"/>
      <circle cx="31" cy="-31" r="7"/>
      <circle cx="62" cy="-24" r="7"/>
      <circle cx="-69" cy="7" r="7"/>
      <circle cx="-38" cy="1" r="7"/>
      <circle cx="-7" cy="-4" r="7"/>
      <circle cx="24" cy="1" r="7"/>
      <circle cx="55" cy="8" r="7"/>
      <circle cx="-52" cy="37" r="7"/>
      <circle cx="-20" cy="33" r="7"/>
      <circle cx="12" cy="31" r="7"/>
      <circle cx="43" cy="39" r="7"/>
      <circle cx="-31" cy="64" r="7"/>
      <circle cx="0" cy="61" r="7"/>
      <circle cx="30" cy="64" r="7"/>
    </g>

    <line x1="0" y1="124" x2="0" y2="166" stroke="#C5A059" stroke-width="5" stroke-linecap="round"/>
    <path d="M-18 142 L18 142 L0 111 Z" fill="#C5A059"/>
  </g>
</svg>
