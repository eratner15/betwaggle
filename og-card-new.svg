<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">Waggle Social Share Card</title>
  <desc id="ogDesc">Premium golf-inspired Waggle social card using Heritage green and burnished gold.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10261A"/>
      <stop offset="55%" stop-color="#1B3022"/>
      <stop offset="100%" stop-color="#1F3727"/>
    </linearGradient>

    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C5A059" stop-opacity="0"/>
      <stop offset="18%" stop-color="#C5A059" stop-opacity="1"/>
      <stop offset="82%" stop-color="#C5A059" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5A059" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="ballLight" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#EDE7D9" stop-opacity="0.9"/>
    </radialGradient>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="18"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.22"/>

  <rect x="28" y="28" width="1144" height="574" rx="20" fill="none" stroke="#C5A059" stroke-opacity="0.28" stroke-width="2"/>
  <rect x="28" y="586" width="1144" height="16" rx="8" fill="#C5A059" fill-opacity="0.84"/>

  <path d="M110 122 H480" stroke="url(#goldLine)" stroke-width="3"/>
  <text x="110" y="167" font-family="Manrope, Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#C5A059">BETWAGGLE.COM</text>

  <text x="110" y="282" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="118" font-weight="700" letter-spacing="1" fill="#FCF9F4">Waggle</text>
  <text x="110" y="350" font-family="Manrope, Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#FCF9F4" fill-opacity="0.9">The Sportsbook for Your Golf Trip</text>

  <g transform="translate(112 412)">
    <rect x="0" y="0" width="174" height="44" rx="22" fill="#FCF9F4" fill-opacity="0.09" stroke="#C5A059" stroke-opacity="0.34"/>
    <text x="87" y="29" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2" fill="#FCF9F4">NO APP DOWNLOAD</text>

    <rect x="194" y="0" width="158" height="44" rx="22" fill="#FCF9F4" fill-opacity="0.09" stroke="#C5A059" stroke-opacity="0.34"/>
    <text x="273" y="29" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2" fill="#FCF9F4">LIVE ODDS</text>

    <rect x="370" y="0" width="196" height="44" rx="22" fill="#FCF9F4" fill-opacity="0.09" stroke="#C5A059" stroke-opacity="0.34"/>
    <text x="468" y="29" text-anchor="middle" font-family="Manrope, Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2" fill="#FCF9F4">AUTO SETTLEMENT</text>
  </g>

  <g transform="translate(910 316)">
