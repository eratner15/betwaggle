<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Waggle Logo</title>
  <desc id="logoDesc">Premium Waggle wordmark with a golf ball and tee icon in Heritage colors.</desc>

  <defs>
    <linearGradient id="wordmarkSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3022"/>
      <stop offset="100%" stop-color="#243F2C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1B3022" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g transform="translate(16 16)">
    <circle cx="74" cy="84" r="62" fill="none" stroke="#C5A059" stroke-width="2" opacity="0.35"/>
    <line x1="74" y1="146" x2="74" y2="162" stroke="#C5A059" stroke-width="3" stroke-linecap="round"/>
    <path d="M66 153 L82 153 L74 138 Z" fill="#C5A059"/>

    <circle cx="74" cy="82" r="34" fill="#FCF9F4" stroke="#1B3022" stroke-width="2"/>
    <g fill="#C5A059" opacity="0.72">
      <circle cx="60" cy="70" r="2.8"/>
      <circle cx="74" cy="66" r="2.8"/>
      <circle cx="88" cy="70" r="2.8"/>
      <circle cx="55" cy="83" r="2.8"/>
      <circle cx="69" cy="79" r="2.8"/>
      <circle cx="83" cy="83" r="2.8"/>
      <circle cx="93" cy="83" r="2.8"/>
      <circle cx="60" cy="96" r="2.8"/>
      <circle cx="74" cy="92" r="2.8"/>
      <circle cx="88" cy="96" r="2.8"/>
    </g>
  </g>

  <g transform="translate(170 136)" filter="url(#softShadow)">
    <text x="0" y="0" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" letter-spacing="1" fill="url(#wordmarkSheen)">Waggle</text>
    <path d="M12 20 H604" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
