<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Affiliates Dashboard | Waggle</title>
  <link rel="canonical" href="https://betwaggle.com/affiliates/dashboard">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url=/affiliates/dashboard">
  <script>
    (function() {
      var target = '/affiliates/dashboard' + (location.search || '') + (location.hash || '');
      if (location.pathname !== '/affiliates/dashboard') {
        location.replace(target);
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/affiliates/dashboard">/affiliates/dashboard</a>...</p>
</body>
</html>
