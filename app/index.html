  <script>
    (function() {
      try {
        var stored = localStorage.getItem('waggle-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'dark' || stored === 'light') ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark-mode', theme === 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <script>
    (function() {
      var key = 'waggle-theme';
      var mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
      var metaTheme = document.querySelector('meta[name="theme-color"]');
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var label = document.getElementById('theme-label');

      function storedTheme() {
        var val = localStorage.getItem(key);
        return val === 'dark' || val === 'light' ? val : null;
      }

      function preferredTheme() {
        var saved = storedTheme();
        if (saved) return saved;
        return mql && mql.matches ? 'dark' : 'light';
      }

      function applyTheme(theme) {
        var dark = theme === 'dark';
        document.documentElement.classList.toggle('dark-mode', dark);
        document.body.classList.toggle('dark-mode', dark);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
        if (metaTheme) metaTheme.setAttribute('content', dark ? '#1B3022' : '#FCF9F4');
        if (icon) icon.innerHTML = dark ? '&#9789;' : '&#9728;';
        if (label) label.textContent = dark ? 'Dark' : 'Light';
        if (btn) {
          btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
          btn.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
        }
      }

      window.WaggleTheme = {
        toggle: function() {
          var next = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
          localStorage.setItem(key, next);
          applyTheme(next);
        }
      };

      applyTheme(preferredTheme());

      if (mql && mql.addEventListener) {
        mql.addEventListener('change', function(e) {
          if (!storedTheme()) applyTheme(e.matches ? 'dark' : 'light');
        });
      }
    })();
  </script>

  <script type="module" src="/app/js/app.js"></script>
  <script>
    // Nuclear cache buster — force fresh on stale mobile clients
    var MG_VERSION = 35;
    var storedVer = parseInt(localStorage.getItem('mg_sw_ver') || '0');
    if (storedVer < MG_VERSION) {
      // Nuke everything and reload
      localStorage.removeItem('mg_state');
      localStorage.setItem('mg_sw_ver', MG_VERSION);
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).then(function() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        });
      } else {
        window.location.reload(true);
      }
    } else {
      localStorage.setItem('mg_sw_ver', MG_VERSION);
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/app/sw.js?v=13').then(function(reg) {
          reg.update();
        }).catch(function(){});
      }
    }
  </script>
