<body>

        <div class="mg-flight-card skeleton-pulse" style="height:100px"></div>

  <button id="score-fab" class="score-fab" style="display:none" onclick="var el=document.getElementById('board-card-score-entry');if(el){el.scrollIntoView({behavior:'smooth',block:'center'})}else{window.MG.openScoreModal()}">

  <div id="mg-toast" class="mg-toast"></div>

  <!-- Outdoor mode toggle — high contrast for on-course glare -->
  <button class="outdoor-toggle" id="outdoor-toggle" onclick="toggleOutdoorMode()">
    <span id="outdoor-icon">&#9728;</span> <span id="outdoor-label">Sun</span>
  </button>

  <script>
    // Outdoor mode — persist preference and auto-detect
    function toggleOutdoorMode() {
      var active = document.body.classList.toggle('outdoor-mode');
      localStorage.setItem('waggle_outdoor', active ? '1' : '0');
      var label = document.getElementById('outdoor-label');
      var icon = document.getElementById('outdoor-icon');
      if (label) label.textContent = active ? 'Indoor' : 'Sun';
      if (icon) icon.innerHTML = active ? '&#9789;' : '&#9728;';
    }
    // Restore on load
    (function() {
      var saved = localStorage.getItem('waggle_outdoor');
      if (saved === '1') {
        document.body.classList.add('outdoor-mode');
        var label = document.getElementById('outdoor-label');
        var icon = document.getElementById('outdoor-icon');
        if (label) label.textContent = 'Indoor';
        if (icon) icon.innerHTML = '&#9789;';
      }
    })();
  </script>

  <script type="module" src="/app/js/app.js"></script>
  <script>
    // Nuclear cache buster — force fresh on stale mobile clients
    var MG_VERSION = 35;
    var storedVer = parseInt(localStorage.getItem('mg_sw_ver') || '0');
    if (storedVer < MG_VERSION) {
      // Nuke everything and reload
      localStorage.removeItem('mg_state');
      localStorage.setItem('mg_sw_ver', MG_VERSION);
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).then(function() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        });
      } else {
        window.location.reload(true);
      }
    } else {
      localStorage.setItem('mg_sw_ver', MG_VERSION);
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/app/sw.js?v=13').then(function(reg) {
          reg.update();
        }).catch(function(){});
      }
    }
  </script>
