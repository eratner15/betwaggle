<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2818"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle accent line -->
  <rect x="540" y="200" width="120" height="3" rx="1.5" fill="#C9A84C" opacity="0.6"/>
  <!-- Brand name -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="2">Waggle</text>
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="1">The Sportsbook for Your Golf Trip</text>
  <!-- Gold rule -->
  <rect x="540" y="370" width="120" height="3" rx="1.5" fill="#C9A84C" opacity="0.6"/>
  <!-- Domain -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#C9A84C" letter-spacing="3">BETWAGGLE.COM</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#C9A84C" opacity="0.4"/>
</svg>
